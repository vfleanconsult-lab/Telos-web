<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telos CMS — Administración</title>
    <!-- Config desde /api/cms-config (evita bloqueo *.yml de Vercel) -->
    <link rel="cms-config-url" href="/api/cms-config" type="text/yaml" />
  </head>
  <body>
    <!-- Captura la referencia al popup para usarla como source en el relay -->
    <script>
      var _popupWin = null;
      var _origOpen = window.open;
      window.open = function () {
        _popupWin = _origOpen.apply(window, arguments);
        return _popupWin;
      };
    </script>

    <!-- BroadcastChannel: relay para Safari/iPadOS donde window.opener es nulo.
         Despacha el mensaje como MessageEvent con source=_popupWin para que
         Sveltia CMS lo reconozca como proveniente del popup de autenticación. -->
    <script>
      (function () {
        if (typeof BroadcastChannel === 'undefined') return;
        var bc = new BroadcastChannel('decap-cms-auth');
        bc.onmessage = function (e) {
          bc.close();
          try {
            window.dispatchEvent(new MessageEvent('message', {
              data:   e.data,
              origin: window.location.origin,
              source: _popupWin || null,
            }));
          } catch (_) {
            window.dispatchEvent(new MessageEvent('message', {
              data:   e.data,
              origin: window.location.origin,
            }));
          }
        };
      })();
    </script>

    <!-- Sveltia CMS — reemplazo directo de Decap/Netlify CMS, mismo config.yml y OAuth -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  </body>
</html>
