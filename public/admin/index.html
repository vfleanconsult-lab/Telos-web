<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telos CMS — Administración</title>
    <!-- Config desde /api/cms-config (evita bloqueo *.yml de Vercel) -->
    <link rel="cms-config-url" href="/api/cms-config" type="text/yaml" />
  </head>
  <body>
    <!-- Captura el popup para los relays que necesitan source=popup -->
    <script>
      var _popupWin = null;
      var _origOpen = window.open;
      window.open = function () {
        _popupWin = _origOpen.apply(window, arguments);
        return _popupWin;
      };
    </script>

    <!-- Intercepta setInterval ANTES de que Sveltia cargue.
         Cuando el timer de Sveltia (1000 ms, chequea popup.closed) dispara,
         primero despachamos el token pendiente de localStorage.
         Esto garantiza que el token llegue ANTES del chequeo popup.closed,
         eliminando la race condition en iPadOS donde el tab admin está en background.
         El popup no se cierra solo — popup.closed === false mientras esperamos —
         así el timer nunca puede lanzar AbortError sin que hayamos entregado el token. -->
    <script>
      (function () {
        var _realSetInterval = window.setInterval;

        function despacharToken(token) {
          localStorage.removeItem('sveltia-cms-auth-pending');
          try {
            window.dispatchEvent(new MessageEvent('message', {
              data:   token,
              origin: window.location.origin,
              source: _popupWin || null,
            }));
          } catch (_) {
            window.dispatchEvent(new MessageEvent('message', {
              data:   token,
              origin: window.location.origin,
            }));
          }
        }

        window.setInterval = function (fn, delay) {
          var args = Array.prototype.slice.call(arguments, 2);
          // Interceptar el timer de 1000 ms de Sveltia (chequeo popup.closed)
          if (delay === 1000) {
            var wrapped = function () {
              var t = localStorage.getItem('sveltia-cms-auth-pending');
              if (t) {
                despacharToken(t);
                return; // no correr fn — Sveltia ya procesó el token y limpió el timer
              }
              fn.apply(this, args);
            };
            return _realSetInterval.call(window, wrapped, delay);
          }
          return _realSetInterval.apply(window, arguments);
        };

        // visibilitychange: cuando admin tab vuelve al frente (popup aún abierto)
        document.addEventListener('visibilitychange', function () {
          if (!document.hidden) {
            var t = localStorage.getItem('sveltia-cms-auth-pending');
            if (t) despacharToken(t);
          }
        });

        // storage event: cuando popup escribe en localStorage (cross-tab, puede
        // disparar incluso en background en algunos navegadores)
        window.addEventListener('storage', function (e) {
          if (e.key === 'sveltia-cms-auth-pending' && e.newValue) {
            despacharToken(e.newValue);
          }
        });
      })();
    </script>

    <!-- BroadcastChannel: relay para cuando window.opener es null en el popup -->
    <script>
      (function () {
        if (typeof BroadcastChannel === 'undefined') return;
        var bc = new BroadcastChannel('decap-cms-auth');
        bc.onmessage = function (e) {
          try {
            window.dispatchEvent(new MessageEvent('message', {
              data:   e.data,
              origin: window.location.origin,
              source: _popupWin || null,
            }));
          } catch (_) {
            window.dispatchEvent(new MessageEvent('message', {
              data:   e.data,
              origin: window.location.origin,
            }));
          }
        };
      })();
    </script>

    <!-- Sveltia CMS — reemplazo directo de Decap/Netlify CMS, mismo config.yml y OAuth -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  </body>
</html>
