<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telos CMS — Administración</title>
    <link rel="cms-config-url" href="/api/cms-config" type="text/yaml" />
  </head>
  <body>
    <!-- Panel de diagnóstico temporal — eliminar después de resolver el bug -->
    <div id="_dbg" style="position:fixed;bottom:0;left:0;right:0;z-index:2147483647;background:rgba(0,0,0,0.93);color:#4f4;font:11px/1.6 monospace;padding:6px 10px;max-height:50vh;overflow-y:auto;word-break:break-all"></div>
    <script>
      function _log(m) {
        var d = document.getElementById('_dbg');
        if (!d) return;
        var t = new Date().toTimeString().substr(0, 8);
        d.innerHTML += '<span style="color:#88f">' + t + '</span> ' + String(m).replace(/</g,'&lt;') + '<br>';
        d.scrollTop = d.scrollHeight;
      }
      _log('✓ página admin cargada — origin=' + window.location.origin);
    </script>

    <!-- Fix iPadOS: interceptar setInterval de Sveltia + entregar token desde localStorage.
         Usamos window.postMessage (no dispatchEvent) porque Safari no propaga el origin
         en el constructor MessageEvent y Sveltia lo valida estrictamente. -->
    <script>
      (function () {
        var _realSetInterval = window.setInterval;
        var _origin          = window.location.origin;
        var _tokenDelivered  = false;

        function enviarToken(token) {
          _tokenDelivered = true;
          localStorage.removeItem('sveltia-cms-auth-pending');
          _log('→ enviarToken: postMessage token[0:50]=' + token.substr(0, 50));
          window.postMessage(token, _origin);
        }

        window.setInterval = function (fn, delay) {
          var rest = Array.prototype.slice.call(arguments, 2);
          if (delay === 1000) {
            _log('✓ setInterval 1000ms interceptado (Sveltia popup monitor)');
            return _realSetInterval.call(window, function () {
              if (_tokenDelivered) return;
              var t = localStorage.getItem('sveltia-cms-auth-pending');
              if (t) {
                _log('✓ localStorage: token encontrado → enviarToken');
                try { enviarToken(t); } catch (e) { _log('✗ enviarToken ERROR: ' + e); }
                return;
              }
              _log('⚠ setInterval tick: sin token → llamando fn original (popup.closed check)');
              fn.apply(this, rest);
            }, delay);
          }
          return _realSetInterval.apply(window, arguments);
        };

        document.addEventListener('visibilitychange', function () {
          _log('visibilitychange: hidden=' + document.hidden);
          if (!document.hidden && !_tokenDelivered) {
            var t = localStorage.getItem('sveltia-cms-auth-pending');
            if (t) { _log('visibilitychange: token encontrado → enviarToken'); try { enviarToken(t); } catch (_) {} }
          }
        });

        // Listener global para ver TODOS los mensajes que llegan a window
        window.addEventListener('message', function (e) {
          _log('message event: origin="' + e.origin + '" data[0:80]="' + String(e.data).substr(0, 80) + '"');
        });

        _log('✓ intercept instalado');
      })();
    </script>

    <!-- BroadcastChannel: relay adicional para cuando el popup usa este canal -->
    <script>
      (function () {
        if (typeof BroadcastChannel === 'undefined') { _log('BroadcastChannel: no soportado'); return; }
        var bc = new BroadcastChannel('decap-cms-auth');
        bc.onmessage = function (e) {
          _log('BroadcastChannel: mensaje recibido → postMessage');
          bc.close();
          window.postMessage(e.data, window.location.origin);
        };
        _log('✓ BroadcastChannel listener instalado');
      })();
    </script>

    <!-- Sveltia CMS — reemplazo directo de Decap/Netlify CMS -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  </body>
</html>
