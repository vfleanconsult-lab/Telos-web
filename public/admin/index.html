<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telos CMS — Administración</title>
  </head>
  <body>
    <!-- Decap CMS con OAuth proxy propio en /api/auth y /api/callback -->

    <!-- DIAGNÓSTICO TEMPORAL: captura todos los postMessage y los muestra en pantalla.
         Eliminar este bloque una vez resuelto el login. -->
    <script>
      window.addEventListener('message', function (e) {
        var bar = document.getElementById('_dbg');
        if (!bar) {
          bar = document.createElement('div');
          bar.id = '_dbg';
          bar.style.cssText =
            'position:fixed;bottom:0;left:0;right:0;background:#111;color:#0f0;' +
            'font-family:monospace;font-size:11px;padding:6px 10px;z-index:99999;' +
            'word-break:break-all;max-height:30vh;overflow:auto';
          document.body.appendChild(bar);
        }
        var line = document.createElement('p');
        line.style.margin = '2px 0';
        line.textContent =
          'origin=' + e.origin +
          ' | data=' + String(e.data).slice(0, 120);
        bar.appendChild(line);
      }, true); // fase de captura: se ejecuta antes que el listener de Decap CMS
    </script>

    <script>window.CMS_MANUAL_INIT = true</script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <!-- Canal de respaldo: recibe el token cuando window.opener es nulo (Safari iOS).
         Re-despacha el mensaje como MessageEvent para que Decap CMS lo procese. -->
    <script>
      (function () {
        if (typeof BroadcastChannel === 'undefined') return;
        var bc = new BroadcastChannel('decap-cms-auth');
        bc.onmessage = function (e) {
          bc.close();
          window.dispatchEvent(new MessageEvent('message', {
            data:   e.data,
            origin: window.location.origin,
          }));
        };
      })();
    </script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'vfleanconsult-lab/Telos-web',
            branch: 'main',
            // base_url apunta a nuestro proxy OAuth en Vercel
            base_url: window.location.origin,
            auth_endpoint: 'api/auth',
          },
          media_folder: 'public/images/blog',
          public_folder: '/images/blog',
          locale: 'es',
          collections: [
            {
              name: 'blog',
              label: 'Artículos',
              label_singular: 'Artículo',
              folder: 'src/content/blog',
              create: true,
              slug: '{{slug}}',
              fields: [
                { label: 'Título',    name: 'titulo',    widget: 'string' },
                { label: 'Bajada',    name: 'bajada',    widget: 'text',
                  hint: 'Párrafo editorial de 2 a 4 líneas — contextualiza y engancha al lector' },
                { label: 'Fecha',     name: 'fecha',     widget: 'datetime',
                  format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false },
                { label: 'Categoría', name: 'categoria', widget: 'select',
                  options: ['Estrategia', 'Excelencia Organizacional', 'Liderazgo'] },
                { label: 'Imagen de portada', name: 'imagen', widget: 'image',
                  required: false, allow_multiple: false },
                { label: 'Contenido', name: 'body',      widget: 'markdown' },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
