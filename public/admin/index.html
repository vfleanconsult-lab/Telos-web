<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telos CMS — Administración</title>
    <!-- Config desde /api/cms-config (evita bloqueo *.yml de Vercel) -->
    <link rel="cms-config-url" href="/api/cms-config" type="text/yaml" />
  </head>
  <body>
    <!-- Captura el popup para el fallback BroadcastChannel (Safari / cross-origin redirect) -->
    <script>
      var _popupWin = null;
      var _origOpen = window.open;
      window.open = function () {
        _popupWin = _origOpen.apply(window, arguments);
        return _popupWin;
      };
    </script>

    <!-- BroadcastChannel: relay para cuando window.opener es null en el popup
         (Safari/iPadOS anula opener tras redirect cross-origin a github.com).
         Pasa source=popup al MessageEvent para que Sveltia no filtre el mensaje.
         El canal se mantiene abierto para que funcione en intentos sucesivos. -->
    <script>
      (function () {
        if (typeof BroadcastChannel === 'undefined') return;
        var bc = new BroadcastChannel('decap-cms-auth');
        bc.onmessage = function (e) {
          try {
            window.dispatchEvent(new MessageEvent('message', {
              data:   e.data,
              origin: window.location.origin,
              source: _popupWin || null,
            }));
          } catch (_) {
            window.dispatchEvent(new MessageEvent('message', {
              data:   e.data,
              origin: window.location.origin,
            }));
          }
        };
      })();
    </script>

    <!-- localStorage + visibilitychange: relay para iPadOS donde el tab admin
         está en background mientras el popup OAuth está abierto. iOS throttlea
         los handlers de background tabs (postMessage, BroadcastChannel).
         Cuando el popup se cierra, el admin tab vuelve al frente y
         visibilitychange dispara ANTES que los ticks pendientes de setInterval
         de Sveltia — esto garantiza que el token llegue antes del AbortError. -->
    <script>
      (function () {
        function despachar(token) {
          localStorage.removeItem('sveltia-cms-auth-pending');
          try {
            window.dispatchEvent(new MessageEvent('message', {
              data:   token,
              origin: window.location.origin,
              source: _popupWin || null,
            }));
          } catch (_) {
            window.dispatchEvent(new MessageEvent('message', {
              data:   token,
              origin: window.location.origin,
            }));
          }
        }

        function chequear() {
          var t = localStorage.getItem('sveltia-cms-auth-pending');
          if (t) despachar(t);
        }

        // Cuando el tab admin vuelve al frente (popup se cerró en iOS)
        document.addEventListener('visibilitychange', function () {
          if (!document.hidden) chequear();
        });

        // storage event: se dispara en otros tabs cuando localStorage cambia,
        // incluso si están en background en algunos navegadores
        window.addEventListener('storage', function (e) {
          if (e.key === 'sveltia-cms-auth-pending' && e.newValue) chequear();
        });
      })();
    </script>

    <!-- Sveltia CMS — reemplazo directo de Decap/Netlify CMS, mismo config.yml y OAuth -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  </body>
</html>
