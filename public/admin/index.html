<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telos CMS — Administración</title>
    <link rel="cms-config-url" href="/api/cms-config" type="text/yaml" />
  </head>
  <body>
    <script>
      (function () {
        var _realSetInterval = window.setInterval;
        var _origin          = window.location.origin;
        var _tokenDelivered  = false;
        // true si el tab estuvo oculto durante el flujo OAuth (path iPadOS/Safari)
        var _wasHidden       = false;

        function enviarToken(token) {
          _tokenDelivered = true;
          localStorage.removeItem('sveltia-cms-auth-pending');
          window.postMessage(token, _origin);
        }

        document.addEventListener('visibilitychange', function () {
          if (document.hidden) { _wasHidden = true; return; }
          if (_tokenDelivered) return;
          var t = localStorage.getItem('sveltia-cms-auth-pending');
          if (t) {
            // 500ms de gracia para que Safari levante completamente el throttle
            // antes de que Sveltia llame fetch(api.github.com)
            setTimeout(function () {
              if (_tokenDelivered) return;
              var t2 = localStorage.getItem('sveltia-cms-auth-pending');
              if (t2) { try { enviarToken(t2); } catch (_) {} }
            }, 500);
          }
        });

        window.setInterval = function (fn, delay) {
          var rest = Array.prototype.slice.call(arguments, 2);
          if (delay === 1000) {
            return _realSetInterval.call(window, function () {
              if (_tokenDelivered) return;
              var t = localStorage.getItem('sveltia-cms-auth-pending');
              if (t) {
                if (!document.hidden && !_wasHidden) {
                  // Desktop: tab nunca estuvo oculto → entregar inmediatamente
                  try { enviarToken(t); } catch (_) {}
                }
                // iPadOS: visibilitychange entregará con delay de 500ms
                return; // siempre bloquear fn cuando hay token (evita popup.closed abort)
              }
              fn.apply(this, rest);
            }, delay);
          }
          return _realSetInterval.apply(window, arguments);
        };
      })();
    </script>

    <!-- BroadcastChannel: relay solo si el tab ya estaba visible (desktop fallback) -->
    <script>
      (function () {
        if (typeof BroadcastChannel === 'undefined') return;
        var bc = new BroadcastChannel('decap-cms-auth');
        bc.onmessage = function (e) {
          bc.close();
          if (!document.hidden) {
            setTimeout(function () {
              window.postMessage(e.data, window.location.origin);
            }, 300);
          }
          // Si está hidden: localStorage ya tiene el token, visibilitychange lo entregará
        };
      })();
    </script>

    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  </body>
</html>
