<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telos CMS вЂ” AdministraciГіn</title>
  </head>
  <body>
    <!-- Decap CMS con OAuth proxy propio en /api/auth y /api/callback -->

    <!-- DIAGNГ“STICO v8: fetch + errores + test directo del token -->
    <script>
      var _t0 = Date.now();
      function _ms() { return (Date.now() - _t0) + 'ms'; }

      var _bar = document.createElement('div');
      _bar.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;background:#111;color:#0f0;' +
        'font:11px/1.5 monospace;padding:6px 8px;z-index:99999;' +
        'max-height:40vh;overflow:auto;word-break:break-all';
      _bar.innerHTML = '<b>DEBUG v8</b>';
      document.documentElement.appendChild(_bar);

      function _log(txt) {
        _bar.innerHTML += '<br>[' + _ms() + '] ' + txt;
        _bar.scrollTop = _bar.scrollHeight;
      }

      // IntercepciГіn de fetch
      var _origFetch = window.fetch;
      window.fetch = function (url) {
        var u = String(url);
        return _origFetch.apply(this, arguments).then(function (res) {
          _log('рџЊђ ' + res.status + ' ' + u.replace('https://', '').slice(0, 60));
          return res;
        }, function (err) {
          _log('вќЊ FETCH: ' + u.slice(0, 40) + ' ' + err);
          return Promise.reject(err);
        });
      };

      // Errores de consola вЂ” captura fallos internos de Decap CMS
      var _origCE = console.error;
      var _origCW = console.warn;
      console.error = function () {
        var msg = Array.prototype.slice.call(arguments).map(String).join(' ');
        _log('вќ— ERR: ' + msg.slice(0, 150));
        return _origCE.apply(this, arguments);
      };
      console.warn = function () {
        var msg = Array.prototype.slice.call(arguments).map(String).join(' ');
        _log('вљ пёЏ WARN: ' + msg.slice(0, 120));
        return _origCW.apply(this, arguments);
      };

      // Promesas rechazadas sin manejador
      window.addEventListener('unhandledrejection', function (ev) {
        _log('рџ”Ґ unhandledrejection: ' + String(ev.reason).slice(0, 150));
      });

      // Conteo de listeners de mensaje
      var _origAdd = EventTarget.prototype.addEventListener;
      var _mc = 0;
      EventTarget.prototype.addEventListener = function (type, fn, opts) {
        if (type === 'message' && this === window) {
          _log('вћ• MSG listener #' + (++_mc));
        }
        return _origAdd.apply(this, arguments);
      };

      // Logger de mensajes de auth entrantes + test directo del token
      _origAdd.call(window, 'message', function (e) {
        var data = String(e.data || '');
        if (data.indexOf('authorization:github:success:') !== 0) return;

        _log('рџ“Ё AUTH MSG recibido');
        var match = data.match(/authorization:(.+?):(.+?):(.+)/);
        if (!match) { _log('вќЊ formato inesperado'); return; }

        var token;
        try { token = JSON.parse(match[3]).token; } catch (_) { token = match[3]; }
        if (!token) { _log('вќЊ token vacГ­o'); return; }
        _log('рџ”‘ token: ' + token.slice(0, 12) + 'вЂ¦');

        // Verifica el token llamando a GitHub API directamente
        _origFetch('https://api.github.com/user', {
          headers: { 'Authorization': 'token ' + token },
        }).then(function (res) {
          _log('рџ‘¤ GitHub /user в†’ ' + res.status);
          if (res.ok) return res.json().then(function (u) {
            _log('рџ‘¤ login=' + u.login + ' name=' + u.name);
          });
          return res.text().then(function (t) { _log('рџ‘¤ error body: ' + t.slice(0, 80)); });
        }).catch(function (err) {
          _log('вќЊ GitHub API: ' + err);
        });
      }, true);
    </script>

    <!-- Canal de respaldo: BroadcastChannel para Safari iOS -->
    <script>
      (function () {
        if (typeof BroadcastChannel === 'undefined') return;
        var bc = new BroadcastChannel('decap-cms-auth');
        bc.onmessage = function (e) {
          bc.close();
          window.dispatchEvent(new MessageEvent('message', {
            data:   e.data,
            origin: window.location.origin,
          }));
        };
      })();
    </script>

    <!-- Decap CMS auto-inicializa desde /admin/config.yml -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
