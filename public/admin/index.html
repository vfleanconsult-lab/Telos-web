<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telos CMS — Administración</title>
  </head>
  <body>
    <!-- Decap CMS con OAuth proxy propio en /api/auth y /api/callback -->

    <!-- DIAGNÓSTICO v5: rastrea add/remove de listeners + timing -->
    <script>
      var _t0 = Date.now();
      function _ms() { return (Date.now() - _t0) + 'ms'; }

      var _bar = document.createElement('div');
      _bar.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;background:#111;color:#0f0;' +
        'font:11px/1.5 monospace;padding:6px 8px;z-index:99999;' +
        'max-height:40vh;overflow:auto;word-break:break-all';
      _bar.innerHTML = '<b>DEBUG v5</b>';
      document.documentElement.appendChild(_bar);

      function _log(txt) {
        _bar.innerHTML += '<br>[' + _ms() + '] ' + txt;
        _bar.scrollTop = _bar.scrollHeight;
      }

      // Rastrea cuándo Decap CMS agrega y remueve listeners de 'message'
      var _origAdd = EventTarget.prototype.addEventListener;
      var _origRem = EventTarget.prototype.removeEventListener;
      var _msgCount = 0;

      EventTarget.prototype.addEventListener = function (type, fn, opts) {
        if (type === 'message' && this === window) {
          _msgCount++;
          _log('➕ ADD listener #' + _msgCount);
        }
        return _origAdd.apply(this, arguments);
      };

      EventTarget.prototype.removeEventListener = function (type, fn, opts) {
        if (type === 'message' && this === window) {
          _log('➖ REMOVE listener (activos≈' + (_msgCount--) + ')');
        }
        return _origRem.apply(this, arguments);
      };

      // Captura postMessages (fase captura — antes que Decap CMS)
      _origAdd.call(window, 'message', function (e) {
        _log('📨 MSG origin=' + e.origin + ' data=' + String(e.data).slice(0, 70) +
             ' listeners_activos≈' + _msgCount);
      }, true);

      // Intercepta fetch — TODAS las URLs
      var _origFetch = window.fetch;
      window.fetch = function (url) {
        var u = String(url);
        return _origFetch.apply(this, arguments).then(function (res) {
          _log('🌐 ' + res.status + ' ' + u.replace('https://', '').slice(0, 55));
          return res;
        }, function (err) {
          _log('❌ FETCH ERR ' + u.replace('https://', '').slice(0, 40) + ' ' + err);
          return Promise.reject(err);
        });
      };

      // Intercepta XHR — por si Decap CMS usa XMLHttpRequest en lugar de fetch
      var _origXHR = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function (method, url) {
        _log('📡 XHR ' + method + ' ' + String(url).replace('https://', '').slice(0, 55));
        return _origXHR.apply(this, arguments);
      };

      // Fix e.source: Safari iOS reemplaza el WindowProxy del popup tras navegar
      // a GitHub (cross-origin). Decap CMS compara e.source con su referencia
      // guardada al abrir el popup; si no coinciden, descarta el mensaje.
      // Solución: capturar el mismo objeto que Decap CMS guarda y re-despachar
      // el mensaje con ese source para que el check pase.
      var _popup = null;
      var _origWinOpen = window.open;
      window.open = function () {
        _popup = _origWinOpen.apply(this, arguments);
        _log('🪟 popup abierto: ' + (_popup ? 'ok' : 'null'));
        return _popup;
      };

      var _fwded = false;
      _origAdd.call(window, 'message', function (e) {
        if (_fwded || !e.data ||
            String(e.data).indexOf('authorization:github:success:') !== 0) return;
        // Si el source ya es el popup capturado, no re-despachar (evita bucle)
        if (_popup && e.source === _popup) {
          _log('✅ source ya coincide con popup — no re-despacho');
          return;
        }
        _log('🔁 re-despachando con source=popup (e.source original: ' +
             (e.source ? 'window' : 'null') + ')');
        _fwded = true;
        var data = e.data, origin = e.origin;
        setTimeout(function () {
          window.dispatchEvent(new MessageEvent('message', {
            data: data, origin: origin, source: _popup,
          }));
        }, 20);
      }, true);
    </script>

    <script>window.CMS_MANUAL_INIT = true</script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <!-- Canal de respaldo: recibe el token cuando window.opener es nulo (Safari iOS).
         Re-despacha el mensaje como MessageEvent para que Decap CMS lo procese. -->
    <script>
      (function () {
        if (typeof BroadcastChannel === 'undefined') return;
        var bc = new BroadcastChannel('decap-cms-auth');
        bc.onmessage = function (e) {
          bc.close();
          window.dispatchEvent(new MessageEvent('message', {
            data:   e.data,
            origin: window.location.origin,
          }));
        };
      })();
    </script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'vfleanconsult-lab/Telos-web',
            branch: 'main',
            // base_url apunta a nuestro proxy OAuth en Vercel
            base_url: window.location.origin,
            auth_endpoint: 'api/auth',
          },
          media_folder: 'public/images/blog',
          public_folder: '/images/blog',
          locale: 'es',
          collections: [
            {
              name: 'blog',
              label: 'Artículos',
              label_singular: 'Artículo',
              folder: 'src/content/blog',
              create: true,
              slug: '{{slug}}',
              fields: [
                { label: 'Título',    name: 'titulo',    widget: 'string' },
                { label: 'Bajada',    name: 'bajada',    widget: 'text',
                  hint: 'Párrafo editorial de 2 a 4 líneas — contextualiza y engancha al lector' },
                { label: 'Fecha',     name: 'fecha',     widget: 'datetime',
                  format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false },
                { label: 'Categoría', name: 'categoria', widget: 'select',
                  options: ['Estrategia', 'Excelencia Organizacional', 'Liderazgo'] },
                { label: 'Imagen de portada', name: 'imagen', widget: 'image',
                  required: false, allow_multiple: false },
                { label: 'Contenido', name: 'body',      widget: 'markdown' },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
