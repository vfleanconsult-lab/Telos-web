<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telos CMS — Administración</title>
    <!-- Config desde /api/cms-config (evita bloqueo *.yml de Vercel) -->
    <link rel="cms-config-url" href="/api/cms-config" type="text/yaml" />
  </head>
  <body>
    <!-- Captura el popup para los relays -->
    <script>
      var _popupWin = null;
      var _origOpen = window.open;
      window.open = function () {
        _popupWin = _origOpen.apply(window, arguments);
        return _popupWin;
      };
    </script>

    <!-- Intercepta setInterval ANTES de que Sveltia cargue.
         Entrega el token vía window.postMessage(token, origin) — postMessage real
         (isTrusted=true, e.source=window) en vez de dispatchEvent sintético que
         puede lanzar en WebKit con source=ventana-cerrada.
         El popup no se cierra solo; popup.closed=false evita AbortError hasta
         que Sveltia procese el token y llame popup.close() él mismo. -->
    <script>
      (function () {
        var _realSetInterval = window.setInterval;
        var _origin = window.location.origin;

        function enviarToken(token) {
          localStorage.removeItem('sveltia-cms-auth-pending');
          // postMessage real a sí mismo — Sveltia lo recibe con isTrusted=true
          // y e.origin === location.origin (coincide con new URL(authURL).origin)
          window.postMessage(token, _origin);
        }

        window.setInterval = function (fn, delay) {
          var rest = Array.prototype.slice.call(arguments, 2);
          if (delay === 1000) {
            var wrapped = function () {
              var t = localStorage.getItem('sveltia-cms-auth-pending');
              if (t) {
                // return FUERA del try: incluso si enviarToken lanza, fn no corre
                try { enviarToken(t); } catch (_) {}
                return;
              }
              fn.apply(this, rest);
            };
            return _realSetInterval.call(window, wrapped, delay);
          }
          return _realSetInterval.apply(window, arguments);
        };

        // visibilitychange: admin tab vuelve al frente (popup aún abierto)
        document.addEventListener('visibilitychange', function () {
          if (!document.hidden) {
            var t = localStorage.getItem('sveltia-cms-auth-pending');
            if (t) { try { enviarToken(t); } catch (_) {} }
          }
        });

        // storage event: puede disparar incluso en background en algunos navegadores
        window.addEventListener('storage', function (e) {
          if (e.key === 'sveltia-cms-auth-pending' && e.newValue) {
            try { enviarToken(e.newValue); } catch (_) {}
          }
        });
      })();
    </script>

    <!-- BroadcastChannel: relay para opener-null (Safari cross-origin redirect).
         Usa postMessage real en vez de dispatchEvent sintético. -->
    <script>
      (function () {
        if (typeof BroadcastChannel === 'undefined') return;
        var bc = new BroadcastChannel('decap-cms-auth');
        bc.onmessage = function (e) {
          try { window.postMessage(e.data, window.location.origin); } catch (_) {}
        };
      })();
    </script>

    <!-- Sveltia CMS -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  </body>
</html>
