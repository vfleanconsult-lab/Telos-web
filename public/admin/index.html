<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telos CMS — Administración</title>
    <!-- Config desde /api/cms-config (evita bloqueo *.yml de Vercel) -->
    <link rel="cms-config-url" href="/api/cms-config" type="text/yaml" />
  </head>
  <body>
    <!-- Captura referencia al popup para el source del synthetic MessageEvent.
         Sveltia solo verifica event.origin y event.data, no event.source,
         pero pasarlo igual por si una versión futura lo valida. -->
    <script>
      var _popupWin = null;
      var _origOpen = window.open;
      window.open = function () {
        _popupWin = _origOpen.apply(window, arguments);
        return _popupWin;
      };
    </script>

    <!-- Relay localStorage → Sveltia (Protocolo B para iPadOS sin window.opener).
         El popup setea 'sveltia-auth-token' en localStorage; el storage event
         dispara en este tab y se re-despacha como MessageEvent nativo a Sveltia.
         Sveltia solo valida event.origin (debe coincidir con base_url) y event.data. -->
    <script>
      window.addEventListener('storage', function (e) {
        if (e.key !== 'sveltia-auth-token' || !e.newValue) return;
        localStorage.removeItem('sveltia-auth-token');
        try {
          window.dispatchEvent(new MessageEvent('message', {
            data:   e.newValue,
            origin: window.location.origin,
            source: _popupWin || null,
          }));
        } catch (_) {
          window.dispatchEvent(new MessageEvent('message', {
            data:   e.newValue,
            origin: window.location.origin,
          }));
        }
      });
    </script>

    <!-- Sveltia CMS — maneja el protocolo OAuth internamente vía postMessage -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  </body>
</html>
