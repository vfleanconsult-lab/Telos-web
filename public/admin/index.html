<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telos CMS — Administración</title>
    <!-- Config desde /api/cms-config (evita bloqueo *.yml de Vercel) -->
    <link rel="cms-config-url" href="/api/cms-config" type="text/yaml" />
  </head>
  <body>
    <!-- Fix iPadOS: Safari throttlea el admin tab mientras el popup OAuth está abierto.
         El postMessage del popup se encola pero Sveltia detecta popup.closed primero
         (via setInterval 1000ms) y lanza "Authentication aborted".
         Solución: interceptar ese setInterval y entregar el token desde localStorage
         usando window.postMessage — NO window.dispatchEvent(new MessageEvent(...)).
         Safari ignora el campo `origin` del MessageEvent constructor (queda vacío ''),
         y Sveltia valida event.origin === new URL(authURL).origin estrictamente. -->
    <script>
      (function () {
        var _realSetInterval = window.setInterval;
        var _origin          = window.location.origin;
        var _tokenDelivered  = false;

        function enviarToken(token) {
          _tokenDelivered = true;
          localStorage.removeItem('sveltia-cms-auth-pending');
          // El navegador asigna event.origin = window.location.origin automáticamente
          window.postMessage(token, _origin);
        }

        // Solo interceptar el intervalo de 1000ms (Sveltia lo usa para monitorear popup.closed)
        window.setInterval = function (fn, delay) {
          var rest = Array.prototype.slice.call(arguments, 2);
          if (delay === 1000) {
            return _realSetInterval.call(window, function () {
              if (_tokenDelivered) return;
              var t = localStorage.getItem('sveltia-cms-auth-pending');
              if (t) { try { enviarToken(t); } catch (_) {} return; }
              fn.apply(this, rest);
            }, delay);
          }
          return _realSetInterval.apply(window, arguments);
        };

        // Fallback: cuando el admin tab vuelve al frente (visibilitychange)
        document.addEventListener('visibilitychange', function () {
          if (!document.hidden && !_tokenDelivered) {
            var t = localStorage.getItem('sveltia-cms-auth-pending');
            if (t) { try { enviarToken(t); } catch (_) {} }
          }
        });
      })();
    </script>

    <!-- BroadcastChannel: relay adicional para cuando el popup usa este canal -->
    <script>
      (function () {
        if (typeof BroadcastChannel === 'undefined') return;
        var bc = new BroadcastChannel('decap-cms-auth');
        bc.onmessage = function (e) {
          bc.close();
          window.postMessage(e.data, window.location.origin);
        };
      })();
    </script>

    <!-- Sveltia CMS — reemplazo directo de Decap/Netlify CMS -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  </body>
</html>
