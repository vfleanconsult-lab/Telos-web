<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telos CMS — Administración</title>
    <!-- Config desde /api/cms-config (evita bloqueo *.yml de Vercel) -->
    <link rel="cms-config-url" href="/api/cms-config" type="text/yaml" />
  </head>
  <body>
    <!-- Fix iPadOS: Safari throttlea el admin tab mientras el popup OAuth está abierto.
         El problema tiene dos partes:
         1. El setInterval de Sveltia (1000ms) detecta popup.closed antes de que llegue
            el token → "Authentication aborted". Fix: interceptar y bloquear fn mientras
            haya token en localStorage.
         2. Si se entrega el token mientras el tab está en background (document.hidden),
            Sveltia llama a fetch(api.github.com) con el tab throttleado → Safari lo
            congela y auth queda pegada en "signing in". Fix: solo entregar cuando
            document.hidden === false (tab activo y sin throttle). -->
    <script>
      (function () {
        var _realSetInterval = window.setInterval;
        var _origin          = window.location.origin;
        var _tokenDelivered  = false;

        function enviarToken(token) {
          _tokenDelivered = true;
          localStorage.removeItem('sveltia-cms-auth-pending');
          window.postMessage(token, _origin);
        }

        window.setInterval = function (fn, delay) {
          var rest = Array.prototype.slice.call(arguments, 2);
          if (delay === 1000) {
            return _realSetInterval.call(window, function () {
              if (_tokenDelivered) return;
              var t = localStorage.getItem('sveltia-cms-auth-pending');
              if (t) {
                // Token disponible: entregar solo si el tab está visible.
                // Si está hidden, bloqueamos fn igualmente (evita popup.closed abort)
                // y esperamos a que visibilitychange entregue el token.
                if (!document.hidden) { try { enviarToken(t); } catch (_) {} }
                return;
              }
              fn.apply(this, rest);
            }, delay);
          }
          return _realSetInterval.apply(window, arguments);
        };

        // Entrega principal en iPadOS: el tab se vuelve visible al cerrarse el popup.
        // En este punto Safari ya no throttlea → fetch a GitHub API funciona.
        document.addEventListener('visibilitychange', function () {
          if (!document.hidden && !_tokenDelivered) {
            var t = localStorage.getItem('sveltia-cms-auth-pending');
            if (t) { try { enviarToken(t); } catch (_) {} }
          }
        });
      })();
    </script>

    <!-- BroadcastChannel: relay solo si el tab ya está visible (escritorio) -->
    <script>
      (function () {
        if (typeof BroadcastChannel === 'undefined') return;
        var bc = new BroadcastChannel('decap-cms-auth');
        bc.onmessage = function (e) {
          bc.close();
          if (!document.hidden) {
            window.postMessage(e.data, window.location.origin);
          }
          // Si está hidden: localStorage ya tiene el token, visibilitychange lo entregará
        };
      })();
    </script>

    <!-- Sveltia CMS — reemplazo directo de Decap/Netlify CMS -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  </body>
</html>
