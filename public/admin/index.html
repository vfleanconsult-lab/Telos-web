<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telos CMS — Administración</title>
    <!-- Redirige a Decap CMS a /api/cms-config para evitar el bloqueo de .yml en Vercel -->
    <link rel="cms-config-url" href="/api/cms-config" type="text/yaml" />
  </head>
  <body>
    <!-- DIAGNÓSTICO v10: wrapper de handlers + fix source=popup para BroadcastChannel -->
    <script>
      var _t0 = Date.now();
      function _ms() { return (Date.now() - _t0) + 'ms'; }

      var _bar = document.createElement('div');
      _bar.style.cssText =
        'position:fixed;bottom:0;left:0;right:0;background:#111;color:#0f0;' +
        'font:11px/1.5 monospace;padding:6px 8px;z-index:99999;' +
        'max-height:40vh;overflow:auto;word-break:break-all';
      _bar.innerHTML = '<b>DEBUG v10</b>';
      document.documentElement.appendChild(_bar);

      function _log(txt) {
        _bar.innerHTML += '<br>[' + _ms() + '] ' + txt;
        _bar.scrollTop = _bar.scrollHeight;
      }

      // Captura referencia al popup que Decap abre para OAuth
      var _popupWin = null;
      var _origOpen = window.open;
      window.open = function () {
        _popupWin = _origOpen.apply(window, arguments);
        _log('🪟 popup: ' + (_popupWin ? 'abierto' : 'bloqueado por browser'));
        return _popupWin;
      };

      // Intercepción de fetch
      var _origFetch = window.fetch;
      window.fetch = function (url) {
        var u = String(url);
        _log('⏳ fetch→ ' + u.replace('https://', '').slice(0, 70));
        return _origFetch.apply(this, arguments).then(function (res) {
          _log('🌐 ' + res.status + ' ' + u.replace('https://', '').slice(0, 60));
          return res;
        }, function (err) {
          _log('❌ fetch ERR: ' + u.slice(0, 50) + ' ' + err);
          return Promise.reject(err);
        });
      };

      // Intercepción de XHR
      (function () {
        var _xOpen = XMLHttpRequest.prototype.open;
        var _xSend = XMLHttpRequest.prototype.send;
        XMLHttpRequest.prototype.open = function (m, u) {
          this._dbgU = String(u); this._dbgM = m;
          return _xOpen.apply(this, arguments);
        };
        XMLHttpRequest.prototype.send = function () {
          var self = this, u = self._dbgU || '?';
          _log('⏳ XHR→ ' + self._dbgM + ' ' + u.replace('https://', '').slice(0, 65));
          self.addEventListener('load', function () {
            _log('🌐 XHR ' + self.status + ' ' + u.replace('https://', '').slice(0, 55));
          });
          self.addEventListener('error', function () { _log('❌ XHR ERR: ' + u.slice(0, 55)); });
          return _xSend.apply(this, arguments);
        };
      })();

      // Monitoreo de localStorage
      (function () {
        var _lsSet = Storage.prototype.setItem;
        Storage.prototype.setItem = function (k, v) {
          _log('💾 localStorage[' + k + '] = ' + String(v).slice(0, 80));
          return _lsSet.apply(this, arguments);
        };
      })();

      // Errores de consola
      var _origCE = console.error;
      var _origCW = console.warn;
      console.error = function () {
        var msg = Array.prototype.slice.call(arguments).map(String).join(' ');
        _log('❗ ERR: ' + msg.slice(0, 200));
        return _origCE.apply(this, arguments);
      };
      console.warn = function () {
        var msg = Array.prototype.slice.call(arguments).map(String).join(' ');
        _log('⚠️ WARN: ' + msg.slice(0, 150));
        return _origCW.apply(this, arguments);
      };

      // Promesas rechazadas
      window.addEventListener('unhandledrejection', function (ev) {
        _log('🔥 unhandledrejection: ' + String(ev.reason).slice(0, 200));
      });

      // Wrapper de handlers de mensaje de Decap para ver qué reciben y qué hacen
      var _origAdd    = EventTarget.prototype.addEventListener;
      var _origRemove = EventTarget.prototype.removeEventListener;
      var _mc = 0;
      var _handlerMap = typeof Map !== 'undefined' ? new Map() : null;

      EventTarget.prototype.addEventListener = function (type, fn, opts) {
        if (type === 'message' && this === window) {
          var idx = ++_mc;
          _log('➕ MSG listener #' + idx);
          var wrapped = (function (i, f) {
            return function (e) {
              var src  = e.source ? 'Window' : 'NULL';
              var data = String(e.data || '');
              _log('🎯 handler #' + i + ' src=' + src + '  data=' + data.slice(0, 70));
              try { return f.call(this, e); }
              catch (err) { _log('💥 handler #' + i + ' threw: ' + String(err).slice(0, 150)); }
            };
          })(idx, fn);
          if (_handlerMap) _handlerMap.set(fn, wrapped);
          return _origAdd.call(this, type, wrapped, opts);
        }
        return _origAdd.apply(this, arguments);
      };

      EventTarget.prototype.removeEventListener = function (type, fn, opts) {
        if (type === 'message' && this === window && _handlerMap) {
          var wrapped = _handlerMap.get(fn);
          if (wrapped) {
            _log('➖ MSG listener removed');
            _handlerMap.delete(fn);
            return _origRemove.call(this, type, wrapped, opts);
          }
        }
        return _origRemove.apply(this, arguments);
      };

      // Nuestro listener de diagnóstico + tests de acceso (capture phase, no se wrappea)
      _origAdd.call(window, 'message', function (e) {
        var data = String(e.data || '');
        var src  = e.source ? 'Window' : 'NULL';

        if (data.indexOf('authorization:github:success:') !== 0) return;

        _log('📨 AUTH MSG  src=' + src + '  origin=' + e.origin);
        var match = data.match(/authorization:(.+?):(.+?):(.+)/);
        if (!match) { _log('❌ formato inesperado'); return; }

        var token;
        try { token = JSON.parse(match[3]).token; } catch (_) { token = match[3]; }
        if (!token) { _log('❌ token vacío'); return; }
        _log('🔑 token: ' + token.slice(0, 12) + '…');

        var h = { 'Authorization': 'token ' + token };

        _origFetch('https://api.github.com/user', { headers: h })
          .then(function (r) {
            _log('👤 /user → ' + r.status);
            if (r.ok) return r.json().then(function (u) {
              _log('👤 login=' + u.login + ' type=' + u.type);
            });
          }).catch(function (err) { _log('❌ /user: ' + err); });

        _origFetch('https://api.github.com/repos/vfleanconsult-lab/Telos-web', { headers: h })
          .then(function (r) {
            _log('📦 /repos → ' + r.status + (r.ok ? ' ✓ push=' : ' ✗'));
            if (!r.ok) return r.json().then(function (j) { _log('📦 ERR: ' + j.message); });
            return r.json().then(function (rep) {
              _log('📦 push=' + (rep.permissions && rep.permissions.push));
            });
          }).catch(function (err) { _log('❌ /repos: ' + err); });
      }, true);
    </script>

    <!-- BroadcastChannel — fallback para cuando window.opener es null (Safari / cross-origin redirect).
         Pasa source=popup al MessageEvent para que Decap no lo filtre por source===null. -->
    <script>
      (function () {
        if (typeof BroadcastChannel === 'undefined') return;
        var bc = new BroadcastChannel('decap-cms-auth');
        bc.onmessage = function (e) {
          bc.close();
          var src = typeof _popupWin !== 'undefined' ? _popupWin : null;
          try {
            // Con source=popup Decap acepta el mensaje aunque opener haya sido anulado
            window.dispatchEvent(new MessageEvent('message', {
              data:   e.data,
              origin: window.location.origin,
              source: src,
            }));
            typeof _log === 'function' && _log('📡 BC→dispatch  src=' + (src ? 'popup' : 'null'));
          } catch (err) {
            // Fallback: sin source
            window.dispatchEvent(new MessageEvent('message', {
              data:   e.data,
              origin: window.location.origin,
            }));
            typeof _log === 'function' && _log('📡 BC→dispatch (fallback)  err=' + err);
          }
        };
      })();
    </script>

    <!-- Decap CMS auto-inicializa — config desde /api/cms-config (ver <link> en <head>) -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
